
<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Game Evolution Premium - Storia dei Videogiochi</title>
  <meta name="description" content="Sito premium lunghissimo sull'evoluzione dei videogiochi con animazioni avanzate, timeline interattiva, interfacce multiple e quiz finale.">
  <style>
    :root{
      --bg:#070b17;
      --bg-soft:#0e1530;
      --bg-soft-2:#121c3f;
      --card:rgba(255,255,255,0.06);
      --card-strong:rgba(255,255,255,0.09);
      --stroke:rgba(255,255,255,0.10);
      --text:#eef4ff;
      --muted:#a9b6da;
      --primary:#7c5cff;
      --secondary:#00d7ff;
      --accent:#ff4fd8;
      --gold:#ffd76a;
      --green:#22c55e;
      --red:#ff5b6e;
      --shadow:0 18px 60px rgba(0,0,0,.35);
      --radius-xl:28px;
      --radius-lg:22px;
      --radius-md:16px;
      --container:1280px;
      --blur:20px;
      --gradient-main:linear-gradient(135deg,var(--primary),var(--secondary));
      --gradient-fancy:linear-gradient(135deg,var(--primary),var(--accent),var(--secondary));
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      scroll-behavior:smooth;
    }

    html,body{
      overflow-x:hidden;
    }

    body{
      font-family:Inter,Arial,Helvetica,sans-serif;
      background:
        radial-gradient(circle at 10% 10%, rgba(124,92,255,.18), transparent 24%),
        radial-gradient(circle at 85% 15%, rgba(0,215,255,.14), transparent 24%),
        radial-gradient(circle at 50% 80%, rgba(255,79,216,.10), transparent 26%),
        linear-gradient(180deg,#050813 0%, #0a1022 30%, #0b1230 65%, #091125 100%);
      color:var(--text);
      line-height:1.6;
      position:relative;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      background:
        linear-gradient(rgba(255,255,255,.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.02) 1px, transparent 1px);
      background-size:42px 42px;
      mask-image:radial-gradient(circle at center, black 30%, transparent 90%);
      z-index:-3;
      opacity:.4;
    }

    a{
      text-decoration:none;
      color:inherit;
    }

    .container{
      width:min(92%, var(--container));
      margin-inline:auto;
      position:relative;
      z-index:2;
    }

    .section{
      padding:110px 0;
      position:relative;
    }

    .section-title{
      font-size:clamp(2.2rem,5vw,4.2rem);
      line-height:1.04;
      margin-bottom:16px;
      letter-spacing:-1px;
    }

    .section-subtitle{
      max-width:930px;
      color:var(--muted);
      font-size:1.05rem;
      margin-bottom:34px;
    }

    .kicker{
      display:inline-flex;
      align-items:center;
      gap:10px;
      padding:10px 16px;
      border-radius:999px;
      background:rgba(124,92,255,.14);
      border:1px solid rgba(124,92,255,.28);
      font-weight:700;
      color:#d7d0ff;
      margin-bottom:18px;
      backdrop-filter:blur(10px);
    }

    .glow{
      position:absolute;
      border-radius:50%;
      filter:blur(70px);
      opacity:.25;
      z-index:-2;
      pointer-events:none;
      animation:floatGlow 12s ease-in-out infinite alternate;
    }

    .glow.one{ width:280px; height:280px; background:var(--primary); top:90px; left:-80px; }
    .glow.two{ width:340px; height:340px; background:var(--secondary); top:180px; right:-120px; animation-delay:1s; }
    .glow.three{ width:260px; height:260px; background:var(--accent); bottom:40px; left:8%; animation-delay:2s; }

    @keyframes floatGlow{
      from{ transform:translateY(-18px) translateX(-12px) scale(1); }
      to{ transform:translateY(18px) translateX(15px) scale(1.08); }
    }

    header{
      position:sticky;
      top:0;
      z-index:1000;
      border-bottom:1px solid rgba(255,255,255,.08);
      background:rgba(6,9,18,.68);
      backdrop-filter:blur(16px);
    }

    .nav{
      min-height:78px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:24px;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:14px;
      font-weight:800;
      letter-spacing:.3px;
      font-size:1.1rem;
      white-space:nowrap;
    }

    .brand-badge{
      width:42px;
      height:42px;
      border-radius:14px;
      display:grid;
      place-items:center;
      background:var(--gradient-main);
      box-shadow:0 0 25px rgba(124,92,255,.3);
      font-size:1.2rem;
    }

    .brand span{
      background:var(--gradient-fancy);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
    }

    .nav-links{
      display:flex;
      flex-wrap:wrap;
      justify-content:flex-end;
      gap:18px;
      list-style:none;
    }

    .nav-links a{
      color:var(--text);
      opacity:.85;
      font-size:.96rem;
      transition:.25s;
      position:relative;
    }

    .nav-links a::after{
      content:"";
      position:absolute;
      left:0;
      bottom:-6px;
      width:0;
      height:2px;
      border-radius:999px;
      background:var(--gradient-main);
      transition:.25s;
    }

    .nav-links a:hover{
      opacity:1;
      color:#fff;
    }

    .nav-links a:hover::after{
      width:100%;
    }

    .hero{
      min-height:96vh;
      display:flex;
      align-items:center;
      overflow:hidden;
    }

    .hero-grid{
      display:grid;
      grid-template-columns:1.18fr .82fr;
      align-items:center;
      gap:40px;
    }

    .hero h1{
      font-size:clamp(2.8rem,7vw,6.2rem);
      line-height:.95;
      letter-spacing:-2px;
      margin-bottom:18px;
    }

    .hero h1 .fancy{
      background:var(--gradient-fancy);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
      background-size:200% 200%;
      animation:gradientShift 6s ease infinite;
    }

    @keyframes gradientShift{
      0%{ background-position:0% 50%; }
      50%{ background-position:100% 50%; }
      100%{ background-position:0% 50%; }
    }

    .hero p{
      color:var(--muted);
      font-size:1.08rem;
      max-width:740px;
      margin-bottom:28px;
    }

    .hero-actions{
      display:flex;
      flex-wrap:wrap;
      gap:14px;
      margin-bottom:30px;
    }

    .btn{
      border:none;
      cursor:pointer;
      padding:15px 22px;
      border-radius:16px;
      font-weight:800;
      font-size:.97rem;
      transition:.25s ease;
      position:relative;
      overflow:hidden;
    }

    .btn-primary{
      color:#fff;
      background:var(--gradient-main);
      box-shadow:var(--shadow);
    }

    .btn-primary:hover{
      transform:translateY(-3px) scale(1.01);
      box-shadow:0 20px 50px rgba(0,0,0,.38);
    }

    .btn-ghost{
      color:#fff;
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.1);
      backdrop-filter:blur(12px);
    }

    .btn-ghost:hover{
      transform:translateY(-3px);
      background:rgba(255,255,255,.08);
    }

    .hero-stats{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:16px;
      margin-top:18px;
    }

    .mini-card{
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.1);
      border-radius:18px;
      padding:18px;
      box-shadow:var(--shadow);
      backdrop-filter:blur(12px);
    }

    .mini-card h3{
      font-size:1.75rem;
      margin-bottom:4px;
      background:var(--gradient-main);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
    }

    .mini-card p{
      margin:0;
      font-size:.93rem;
    }

    .hero-panel{
      position:relative;
      perspective:1000px;
    }

    .floating-ui{
      background:linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.03));
      border:1px solid rgba(255,255,255,.10);
      border-radius:32px;
      padding:22px;
      box-shadow:var(--shadow);
      backdrop-filter:blur(20px);
      transform:rotateY(-8deg) rotateX(4deg);
      animation:heroFloat 6s ease-in-out infinite;
    }

    @keyframes heroFloat{
      0%,100%{ transform:rotateY(-8deg) rotateX(4deg) translateY(0); }
      50%{ transform:rotateY(-5deg) rotateX(2deg) translateY(-10px); }
    }

    .ui-header{
      display:flex;
      align-items:center;
      justify-content:space-between;
      margin-bottom:18px;
      gap:12px;
    }

    .ui-dots{
      display:flex;
      gap:8px;
    }

    .ui-dots span{
      width:12px;
      height:12px;
      border-radius:50%;
      display:block;
      background:#fff3;
    }

    .ui-dots span:nth-child(1){ background:#ff5f57; }
    .ui-dots span:nth-child(2){ background:#febc2e; }
    .ui-dots span:nth-child(3){ background:#28c840; }

    .ui-tag{
      padding:8px 12px;
      border-radius:999px;
      background:rgba(0,215,255,.12);
      border:1px solid rgba(0,215,255,.24);
      color:#c4f8ff;
      font-size:.85rem;
      font-weight:700;
    }

    .screen{
      min-height:500px;
      border-radius:24px;
      padding:22px;
      background:
        radial-gradient(circle at top right, rgba(124,92,255,.18), transparent 30%),
        linear-gradient(180deg,#0a1022,#0e1731 60%, #0b132a);
      border:1px solid rgba(255,255,255,.08);
      display:flex;
      flex-direction:column;
      gap:16px;
      position:relative;
      overflow:hidden;
    }

    .screen::before{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(180deg, transparent, rgba(255,255,255,.02));
      pointer-events:none;
    }

    .screen-box{
      position:relative;
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.08);
      border-radius:20px;
      padding:16px;
    }

    .screen-title{
      font-size:1rem;
      margin-bottom:8px;
      font-weight:800;
      color:#fff;
    }

    .bars{
      display:grid;
      gap:12px;
    }

    .bar{
      display:grid;
      gap:7px;
    }

    .bar span{
      display:flex;
      justify-content:space-between;
      font-size:.9rem;
      color:#dbe7ff;
    }

    .bar-track{
      height:10px;
      border-radius:999px;
      overflow:hidden;
      background:rgba(255,255,255,.08);
    }

    .bar-fill{
      height:100%;
      width:0;
      border-radius:999px;
      background:var(--gradient-main);
      transition:width 1.5s ease;
    }

    .screen-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px;
    }

    .pill-list{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
    }

    .pill{
      padding:9px 12px;
      border-radius:999px;
      background:rgba(124,92,255,.14);
      border:1px solid rgba(124,92,255,.24);
      color:#ddd7ff;
      font-size:.86rem;
      font-weight:700;
    }

    .orb{
      position:absolute;
      border-radius:50%;
      filter:blur(12px);
      opacity:.4;
      animation:orbs 8s ease-in-out infinite alternate;
    }

    .orb.a{ width:80px; height:80px; background:var(--secondary); top:16px; right:18px; }
    .orb.b{ width:55px; height:55px; background:var(--accent); bottom:26px; left:14px; animation-delay:1.5s; }

    @keyframes orbs{
      from{ transform:translateY(0) translateX(0) scale(1); }
      to{ transform:translateY(-10px) translateX(10px) scale(1.12); }
    }

    .interface-grid{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:22px;
    }

    .panel{
      background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      border:1px solid rgba(255,255,255,.08);
      border-radius:var(--radius-xl);
      padding:24px;
      box-shadow:var(--shadow);
      position:relative;
      overflow:hidden;
      transition:.3s ease;
      min-height:280px;
    }

    .panel:hover{
      transform:translateY(-8px);
      border-color:rgba(124,92,255,.28);
    }

    .panel::before{
      content:"";
      position:absolute;
      inset:-60% auto auto -20%;
      width:180px;
      height:180px;
      background:radial-gradient(circle, rgba(124,92,255,.18), transparent 70%);
      pointer-events:none;
    }

    .panel-icon{
      width:62px;
      height:62px;
      border-radius:18px;
      display:grid;
      place-items:center;
      background:var(--gradient-main);
      margin-bottom:18px;
      font-size:1.45rem;
      box-shadow:0 15px 30px rgba(124,92,255,.22);
    }

    .panel h3{
      font-size:1.35rem;
      margin-bottom:10px;
    }

    .panel p{
      color:var(--muted);
      font-size:.97rem;
    }

    .premium-grid{
      display:grid;
      grid-template-columns:1.05fr .95fr;
      gap:24px;
      align-items:start;
    }

    .big-card{
      background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      border:1px solid rgba(255,255,255,.08);
      border-radius:30px;
      padding:28px;
      box-shadow:var(--shadow);
      min-height:100%;
      position:relative;
      overflow:hidden;
    }

    .big-card::after{
      content:"";
      position:absolute;
      inset:auto -40px -40px auto;
      width:160px;
      height:160px;
      background:radial-gradient(circle, rgba(0,215,255,.18), transparent 70%);
      pointer-events:none;
    }

    .feature-list{
      display:grid;
      gap:14px;
      margin-top:18px;
    }

    .feature{
      display:flex;
      gap:14px;
      align-items:flex-start;
      padding:14px;
      border-radius:16px;
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.06);
    }

    .feature-bullet{
      min-width:42px;
      width:42px;
      height:42px;
      border-radius:14px;
      display:grid;
      place-items:center;
      background:rgba(124,92,255,.16);
      border:1px solid rgba(124,92,255,.24);
      font-weight:800;
      color:#ddd7ff;
    }

    .feature strong{
      display:block;
      margin-bottom:3px;
      font-size:1rem;
    }

    .feature p{
      color:var(--muted);
      font-size:.95rem;
    }

    .tabs{
      display:flex;
      flex-wrap:wrap;
      gap:12px;
      margin-bottom:22px;
    }

    .tab-btn{
      padding:11px 16px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.09);
      background:rgba(255,255,255,.04);
      color:#fff;
      cursor:pointer;
      font-weight:700;
      transition:.25s;
    }

    .tab-btn.active,
    .tab-btn:hover{
      background:var(--gradient-main);
      border-color:transparent;
    }

    .tab-content{
      display:none;
      animation:fadeIn .4s ease;
    }

    .tab-content.active{
      display:block;
    }

    @keyframes fadeIn{
      from{ opacity:0; transform:translateY(8px); }
      to{ opacity:1; transform:translateY(0); }
    }

    .stats-grid{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:20px;
    }

    .stat-card{
      text-align:center;
      padding:28px 18px;
      border-radius:22px;
      background:linear-gradient(180deg, rgba(124,92,255,.14), rgba(0,215,255,.08));
      border:1px solid rgba(255,255,255,.08);
      box-shadow:var(--shadow);
      transition:.25s;
    }

    .stat-card:hover{
      transform:translateY(-6px);
    }

    .stat-number{
      font-size:clamp(2rem,4vw,3.4rem);
      font-weight:900;
      letter-spacing:-1px;
      line-height:1;
      margin-bottom:10px;
      background:var(--gradient-fancy);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
    }

    .stat-card p{
      color:var(--muted);
      font-size:.94rem;
    }

    .timeline-controls{
      display:flex;
      flex-wrap:wrap;
      gap:12px;
      margin-bottom:28px;
    }

    .filter-btn{
      border:none;
      cursor:pointer;
      padding:12px 16px;
      border-radius:999px;
      color:#fff;
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.08);
      font-weight:800;
      transition:.25s;
    }

    .filter-btn.active,
    .filter-btn:hover{
      background:var(--gradient-main);
      border-color:transparent;
    }

    .timeline{
      position:relative;
      display:grid;
      gap:28px;
      margin-top:10px;
    }

    .timeline::before{
      content:"";
      position:absolute;
      top:0;
      bottom:0;
      left:22px;
      width:4px;
      background:linear-gradient(var(--primary), var(--secondary), var(--accent));
      border-radius:999px;
      opacity:.85;
    }

    .timeline-item{
      padding-left:76px;
      position:relative;
    }

    .timeline-dot{
      position:absolute;
      left:6px;
      top:14px;
      width:34px;
      height:34px;
      border-radius:50%;
      background:var(--gradient-main);
      border:5px solid #0a1023;
      box-shadow:0 0 0 8px rgba(124,92,255,.11);
    }

    .timeline-content{
      padding:24px;
      border-radius:24px;
      background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      border:1px solid rgba(255,255,255,.08);
      box-shadow:var(--shadow);
      transition:.3s ease;
    }

    .timeline-content:hover{
      transform:translateX(6px);
      border-color:rgba(0,215,255,.25);
    }

    .year{
      display:inline-flex;
      padding:7px 12px;
      border-radius:999px;
      background:rgba(255,215,106,.10);
      color:var(--gold);
      border:1px solid rgba(255,215,106,.22);
      font-size:.88rem;
      font-weight:800;
      margin-bottom:12px;
    }

    .timeline-content h3{
      font-size:1.35rem;
      margin-bottom:8px;
    }

    .timeline-content p{
      color:var(--muted);
      margin-bottom:10px;
    }

    .timeline-content ul{
      color:var(--muted);
      padding-left:18px;
    }

    .timeline-content li{
      margin:6px 0;
    }

    .showcase-grid{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:20px;
    }

    .showcase-card{
      border-radius:24px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.08);
      background:rgba(255,255,255,.04);
      box-shadow:var(--shadow);
      transition:.3s ease;
    }

    .showcase-card:hover{
      transform:translateY(-8px) scale(1.01);
    }

    .showcase-media{
      height:220px;
      background:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,.16), transparent 25%),
        linear-gradient(135deg, rgba(124,92,255,.6), rgba(0,215,255,.25), rgba(255,79,216,.28)),
        linear-gradient(180deg,#182348,#0b1431);
      position:relative;
      overflow:hidden;
    }

    .showcase-media::before{
      content:"";
      position:absolute;
      inset:22px;
      border-radius:24px;
      border:1px solid rgba(255,255,255,.13);
      background:linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.02));
    }

    .showcase-media::after{
      content:"";
      position:absolute;
      width:120px;
      height:120px;
      border-radius:50%;
      right:-15px;
      bottom:-15px;
      background:rgba(255,255,255,.12);
      filter:blur(10px);
    }

    .showcase-body{
      padding:22px;
    }

    .showcase-body h3{
      font-size:1.18rem;
      margin-bottom:8px;
    }

    .showcase-body p{
      color:var(--muted);
      font-size:.95rem;
    }

    .split{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:24px;
    }

    .accordion{
      display:grid;
      gap:14px;
    }

    .faq{
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.08);
      border-radius:20px;
      overflow:hidden;
      box-shadow:var(--shadow);
    }

    .faq-q{
      width:100%;
      background:none;
      color:#fff;
      border:none;
      text-align:left;
      cursor:pointer;
      padding:18px 20px;
      font-size:1rem;
      font-weight:800;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
    }

    .faq-a{
      max-height:0;
      overflow:hidden;
      color:var(--muted);
      transition:max-height .35s ease, padding .35s ease;
      padding:0 20px;
    }

    .faq.active .faq-a{
